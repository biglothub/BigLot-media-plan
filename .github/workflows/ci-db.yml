name: CI and DB Migrate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check migrations
        run: npm run db:check

  migrate:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure DATABASE_URL exists
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is missing"
            exit 1
          fi

      - name: Apply migrations
        run: npm run db:migrate
